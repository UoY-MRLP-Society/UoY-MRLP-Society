<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Contact Us</h1>
        <p>Get in touch with us!</p>
    </header>

<nav>
    <a href="index.html">Home</a> | 
    <a href="about.html">About Us</a>|
    <a href="sustainability.html">Sustainability</a>|
    <a href="accessibility.html">Accessibility</a>|
    <a href="contact.html">Contact Us</a>
</nav>

    <main>
        <section>
            <h2>Get in Touch</h2>
            <p>Have a question for the MRLP Society? Drop us a message below!</p>
            
            <!-- The form sends messages to Formspree, which forwards them to you -->
            <form action="https://formspree.io/f/xdargrea" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="email">Your Email Address:</label>
                    <input type="email" id="email" name="_replyto" required placeholder="name@example.com">
                </div>
                
                <div class="form-group">
                    <label for="message">Your Message:</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>
                </div>
                
                <button type="submit">Send Message</button>
            </form>
        </section>


</body>
</html>
