<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <!-- This imports the social media icon fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>
<body>

    <header>
        <h1>Contact Us</h1>
        <p>Get in touch with us!</p>
    </header>

<nav>
    <a href="index.html">Home</a> | 
    <a href="about.html">About Us</a>|
    <a href="sustainability.html">Sustainability</a>|
    <a href="accessibility.html">Accessibility</a>|
    <a href="contact.html">Contact Us</a>
</nav>

    <main>
       <section>
    <!-- Grouped heading text to center it -->
    <div class="contact-form-heading">
        <h2>Contact Us</h2>
        <p>Have a question for the MRLP Society? Drop us a message below!</p>
    </div>
    
    <!-- The Form itself -->
    <form action="https://formspree.io" method="POST" class="contact-form">
        <div class="form-group">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required placeholder="Enter your full name">
        </div>
        
        <div class="form-group">
            <label for="email">Your Email Address:</label>
            <input type="email" id="email" name="_replyto" required placeholder="name@example.com">
        </div>
        
        <div class="form-group">
            <label for="message">Your Message:</label>
            <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>
        </div>
        
        <button type="submit">Send Message</button>
    </form>

    <!-- Updated Social & Link Section -->
    <div class="social-media-links">
        <h3>Connect With Us</h3>
        <!-- Instagram Link -->
        <a href="https://www.instagram.com/mr.loonysoc" target="_blank" class="social-icon instagram" title="Instagram"><i class="fab fa-instagram"></i></a>
        
        <!-- Gmail Link (Opens a fresh email window addressed to you) -->
        <a href="mailto:mrloonypartysoc@york.ac.uk" class="social-icon gmail" title="Email Us"><i class="fas fa-envelope"></i></a>
        
        <!-- University Webpage Link -->
        <a href="https://yorksu.org/activities/view/monster-raving-loony-party-soc" target="_blank" class="social-icon university" title="University Page"><i class="fas fa-globe"></i></a>
    </div>
</section>

            </form>
        </section>



</body>
</html>
